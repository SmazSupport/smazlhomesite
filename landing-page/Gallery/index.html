<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pumpkin Carving with Goats</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Pumpkin Carving with Goats</h1>
    </header>
    <main class="gallery">
      <!-- Main Image and Navigation -->
      <div class="main-content">
        <button id="prev" class="nav-button">❮</button>
        <a
          href=""
          data-lightbox="gallery"
          id="main-link"
          class="main-image-wrapper"
        >
          <img src="" id="main-image" alt="Main Display" />
        </a>
        <button id="next" class="nav-button">❯</button>
      </div>

      <!-- Description -->
      <div id="image-description" class="description"></div>

      <!-- Thumbnails -->
      <div class="thumbnails" id="thumbnails"></div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
    <script>
      fetch("gallery.json")
        .then((response) => response.json())
        .then((data) => {
          const thumbnailsContainer = document.getElementById("thumbnails");
          const mainImage = document.getElementById("main-image");
          const mainLink = document.getElementById("main-link");
          const description = document.getElementById("image-description");
          const prevButton = document.getElementById("prev");
          const nextButton = document.getElementById("next");

          let currentIndex = 0;

          function updateMainImage(index) {
            const image = data.images[index];
            mainImage.src = image.src;
            mainImage.alt = image.description;
            mainLink.href = image.src;
            description.textContent = image.description;

            document.querySelectorAll(".thumbnail").forEach((thumb, i) => {
              thumb.classList.toggle("active", i === index);
            });
          }

          data.images.forEach((image, index) => {
            const thumb = document.createElement("img");
            thumb.src = image.src;
            thumb.alt = image.description;
            thumb.className = "thumbnail";
            thumb.dataset.index = index;
            thumb.addEventListener("click", () => updateMainImage(index));
            thumbnailsContainer.appendChild(thumb);
          });

          prevButton.addEventListener("click", () => {
            currentIndex =
              (currentIndex - 1 + data.images.length) % data.images.length;
            updateMainImage(currentIndex);
          });

          nextButton.addEventListener("click", () => {
            currentIndex = (currentIndex + 1) % data.images.length;
            updateMainImage(currentIndex);
          });

          updateMainImage(currentIndex);
        });
    </script>
  </body>
</html>
